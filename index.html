<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiKipa Progam Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #00cfd1, #005c97);
            color: white;
            font-family: 'Poppins', Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeIn 1s ease-in-out;
        }

        /* Logo အတွက် CSS အသစ်ထည့်ခြင်း */
        .logo{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    box-shadow:0 0 20px #00cfd1;
        }

        h1 {
            font-size: 45px;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        p {
            font-size: 20px;
            margin-bottom: 30px;
            font-weight: 300;
        }

        button {
            background: white;
            color: #00cfd1;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            background: #f8f9fa;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="a_high_detail_neon_sci_fi_logo_graphic_scene_a_f.png"
     alt="AiKipa Program"
     class="logo">
        
        <h1>PremiumGiftPlan,

Nft,Stars 

Shop </h1>
        <p>လိုအပ်တာများဝယ်ယူနိုင်ပါတယ်</p>
        <button onclick="alert('Hello from AiKipa!')">
            Start
        </button>
    </div>
</body>
</html>
