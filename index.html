<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiKipa Progam Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            /* ရိုးရိုးအရောင်အစား Gradient အရောင်ပြေးကို အသုံးပြုခြင်း */
            background: linear-gradient(135deg, #00cfd1, #005c97);
            color: white;
            font-family: 'Poppins', Arial, sans-serif;
            margin: 0;
            height: 100vh; /* မျက်နှာပြင် အပြည့်ယူရန် */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* စာသားနဲ့ ခလုတ်တွေကို ဖန်သားပြင် (Glass) ပုံစံ ဘောက်စ်ထဲ ထည့်ခြင်း */
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeIn 1s ease-in-out; /* ဝင်ဝင်ချင်း Animation */
        }

        h1 {
            font-size: 45px;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        p {
            font-size: 20px;
            margin-bottom: 30px;
            font-weight: 300;
        }

        button {
            background: white;
            color: #00cfd1;
            border: none;
            padding: 15px 40px;
            border-radius: 50px; /* ဘေးဘောင်ကို လုံးဝိုင်းသွားအောင် လုပ်ခြင်း */
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease; /* အရောင်ပြောင်းလဲမှု ညင်သာစေရန် */
        }

        /* ခလုတ်ပေါ် Mouse တင်လိုက်သည့်အခါ (Hover Effect) */
        button:hover {
            transform: translateY(-5px); /* အပေါ်ကို နည်းနည်း ကြွတက်သွားမည် */
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            background: #f8f9fa;
        }

        /* ဝင်ဝင်ချင်း အပေါ်ကို တက်လာသော Animation (Keyframes) */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AiKipa Testing</h1>
        <p>Welcome to the enhanced AiKipa!</p>
        <button onclick="alert('Hello from AiKipa!')">
            Start
        </button>
    </div>
</body>
</html>
