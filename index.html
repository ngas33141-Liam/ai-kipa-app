<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AiKipa Mini Shop</title>

<style>

body{
margin:0;
background:#000;
font-family:Poppins,sans-serif;
color:yellow;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:380px;
padding:20px;
text-align:center;
}

.logo{
width:150px;
height:150px;
margin:auto;
border-radius:50%;
background:rgba(255,255,255,.05);
backdrop-filter:blur(15px);
border:2px solid cyan;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:18px;
font-weight:bold;
color:cyan;
box-shadow:0 0 25px cyan;
margin-bottom:25px;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 20px cyan;}
to{box-shadow:0 0 40px cyan;}
}

h1{
color:cyan;
font-size:22px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,.05);
backdrop-filter:blur(15px);
border:1px solid rgba(0,255,255,.3);
border-radius:25px;
padding:18px;
box-shadow:0 0 15px rgba(0,255,255,.15);
transition:.3s;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.card:hover{
transform:translateY(-5px);
}

.price{
color:cyan;
font-size:16px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#00ffff,#00bfff);
color:black;
font-weight:bold;
font-size:15px;
cursor:pointer;
}

.back{
margin-top:20px;
background:linear-gradient(45deg,#00ffff,#00bfff);
color:black;
}

</style>
</head>

<body>

<!-- HOME -->
<div class="container" id="homePage">

<div class="logo">
AiKipa<br>Mini Bot
</div>

<h1>Premium Gift Plan<br>NFT & Stars</h1>

<button onclick="showPage()">Start</button>

</div>

<!-- SHOP -->
<div class="container" id="shopPage" style="display:none">

<h1>AiKipa Mini Shop👛</h1>

<!-- MENU -->
<div id="menu" class="grid">

<div class="card">
⭐
<button onclick="showCategory('stars')">Stars</button>
</div>

<div class="card">
🎁
<button onclick="showCategory('premium')">Premium</button>
</div>

<div class="card">
🛸
<button onclick="showCategory('nft')">NFT</button>
</div>

</div>

<!-- STARS -->
<div id="stars" style="display:none">

<h1>⭐ Stars</h1>

<div class="grid">

<div class="card">50 Stars<div class="price">3500 Ks</div><button onclick="buy('50 Stars')">Buy</button></div>
<div class="card">100 Stars<div class="price">7000 Ks</div><button onclick="buy('100 Stars')">Buy</button></div>
<div class="card">150 Stars<div class="price">10400 Ks</div><button onclick="buy('150 Stars')">Buy</button></div>
<div class="card">200 Stars<div class="price">13800 Ks</div><button onclick="buy('200 Stars')">Buy</button></div>

</div>

<button class="back" onclick="backMenu()">⬅ Back</button>
</div>

<!-- PREMIUM -->
<div id="premium" style="display:none">

<h1>👑 Premium</h1>

<div class="grid">

<div class="card">3 Months<div class="price">55000 Ks</div><button onclick="buy('Premium 3 Months')">Buy</button></div>
<div class="card">6 Months<div class="price">73600 Ks</div><button onclick="buy('Premium 6 Months')">Buy</button></div>
<div class="card">12 Months<div class="price">134000 Ks</div><button onclick="buy('Premium 12 Months')">Buy</button></div>

</div>

<button class="back" onclick="backMenu()">⬅ Back</button>
</div>

<!-- NFT -->
<div id="nft" style="display:none">

<h1>🛸 NFT</h1>

<div class="card">
NFT Buy/Sell
<div class="price">Click</div>
<button onclick="buy('NFT')">Buy</button>
</div>

<button class="back" onclick="backMenu()">⬅ Back</button>
</div>

</div>

<script>

const homePage = document.getElementById("homePage");
const shopPage = document.getElementById("shopPage");
const menu = document.getElementById("menu");
const stars = document.getElementById("stars");
const premium = document.getElementById("premium");
const nft = document.getElementById("nft");

function showPage(){
homePage.style.display="none";
shopPage.style.display="block";
menu.style.display="grid";
}

function showCategory(type){

menu.style.display="none";

stars.style.display="none";
premium.style.display="none";
nft.style.display="none";

document.getElementById(type).style.display="block";
}

function backMenu(){

menu.style.display="grid";

stars.style.display="none";
premium.style.display="none";
nft.style.display="none";
}

function buy(product){
window.open("https://t.me/AiKipa?text="+encodeURIComponent(product+" ဝယ်ချင်ပါတယ်"));
}

</script>

</body>
  </html>
