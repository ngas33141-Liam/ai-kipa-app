<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AiKipa Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding-bottom:90px;
}

.container{
width:350px;
background:#111;
border-radius:25px;
padding:25px;
box-shadow:0 0 20px rgba(0,255,255,.3);
text-align:center;
}

.logo{
width:160px;
height:160px;
margin:auto;
border-radius:50%;
border:3px solid cyan;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
font-weight:bold;
color:cyan;
box-shadow:0 0 30px cyan;
margin-bottom:20px;
}

h1{
color:cyan;
margin-bottom:15px;
}

.item{
background:#1a1a1a;
padding:18px;
border-radius:20px;
margin-top:15px;
box-shadow:0 0 10px rgba(0,255,255,.2);
}

.price{
color:cyan;
font-size:22px;
margin:10px 0;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:50px;
background:cyan;
color:black;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 20px cyan;
}

.backBtn{
background:#333;
color:white;
}

</style>
</head>
<body>

<!-- HOME PAGE -->
<div class="container" id="homePage">

<div class="logo">
AiKipa
</div>

<h1>Premium Gift Plan<br>NFT Stars Shop</h1>

<br>

<button onclick="showPage('shopPage')">
Start
</button>

</div>



<!-- SHOP PAGE -->
<div class="container" id="shopPage" style="display:none">

<h1>🛒 Shop</h1>

<div id="menu">

<div class="item">
<button onclick="showCategory('stars')">
⭐ Stars
</button>
</div>

<div class="item">
<button onclick="showCategory('premium')">
👑 Premium
</button>
</div>

<div class="item">
<button onclick="showCategory('nft')">
🖼 NFT
</button>
</div>

</div>


<!-- Stars -->
<div id="stars" style="display:none">

<h1>⭐ Stars</h1>

<div class="item">
<h2>50 Stars</h2>
<div class="price">3500 Ks</div>
<button onclick="buy('50 Stars')">Buy Now</button>
</div>

<div class="item">
<h2>100 Stars</h2>
<div class="price">7000 Ks</div>
<button onclick="buy('100 Stars')">Buy Now</button>
</div>

<div class="item">
<h2>500 Stars</h2>
<div class="price">34500 Ks</div>
<button onclick="buy('500 Stars')">Buy Now</button>
</div>

<div class="item">
<h2>1000 Stars</h2>
<div class="price">69000 Ks</div>
<button onclick="buy('1000 Stars')">Buy Now</button>
</div>

<button class="backBtn" onclick="backMenu()">
⬅ Back
</button>

</div>


<!-- Premium -->
<div id="premium" style="display:none">

<h1>👑 Premium</h1>

<div class="item">
<h2>3 Months</h2>
<div class="price">55000 Ks</div>
<button onclick="buy('Premium 3 Months')">Buy Now</button>
</div>

<div class="item">
<h2>6 Months</h2>
<div class="price">73600 Ks</div>
<button onclick="buy('Premium 6 Months')">Buy Now</button>
</div>

<div class="item">
<h2>12 Months</h2>
<div class="price">134000 Ks</div>
<button onclick="buy('Premium 12 Months')">Buy Now</button>
</div>

<button class="backBtn" onclick="backMenu()">
⬅ Back
</button>

</div>


<!-- NFT -->
<div id="nft" style="display:none">

<h1>🖼 NFT</h1>

<div class="item">
<h2>NFT Service</h2>
<div class="price">Contact Admin</div>
<button onclick="buy('NFT')">Buy Now</button>
</div>

<button class="backBtn" onclick="backMenu()">
⬅ Back
</button>

</div>

</div>


<script>

function showPage(pageId){
document.getElementById("homePage").style.display="none";
document.getElementById(pageId).style.display="block";
}

function showCategory(type){

document.getElementById("menu").style.display="none";

document.getElementById("stars").style.display="none";
document.getElementById("premium").style.display="none";
document.getElementById("nft").style.display="none";

document.getElementById(type).style.display="block";

}

function backMenu(){

document.getElementById("menu").style.display="block";

document.getElementById("stars").style.display="none";
document.getElementById("premium").style.display="none";
document.getElementById("nft").style.display="none";

}

function buy(product){

window.open(
"https://t.me/AiKipa?text=" +
encodeURIComponent(product + " ဝယ်ယူချင်ပါတယ်")
);

}

</script>

</body>
</html>
