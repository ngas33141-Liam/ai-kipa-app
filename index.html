<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AiKipa Program Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#00cfd1,#005c97);
    color:white;
}

.container{
    background:rgba(255,255,255,0.1);
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
    max-width:350px;
    animation:fadeIn 1s ease;
}

.logo{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    box-shadow:0 0 30px #00ffff;
    margin-bottom:20px;
}

h1{
    font-size:32px;
    margin:0;
}

p{
    font-size:18px;
}

button{
    background:white;
    color:#00cfd1;
    border:none;
    padding:15px 35px;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    margin:10px;
    transition:.3s;
}

button:hover{
    transform:translateY(-5px);
}

.item{
    background:rgba(255,255,255,0.15);
    padding:15px;
    margin:15px 0;
    border-radius:15px;
}

.price{
    font-size:22px;
    color:#ffff66;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<!-- Home Page -->
<div class="container" id="homePage">

    <img src="a_high_detail_neon_sci_fi_logo_graphic_scene_a_f.png"
    class="logo">

    <h1>Premium Gift Plan<br>NFT Stars Shop</h1>

    <p>
        လိုအပ်သော Premium Gift, NFT နှင့် Stars များကို ဝယ်ယူနိုင်ပါတယ်။
    </p>

    <button onclick="openShop()">
        Start
    </button>

</div>

<!-- Shop Page -->
<div class="container" id="shopPage" style="display:none;">

    <h1>🛒 Shop Page</h1>

    <div class="item">
        <h2>Telegram Stars</h2>
        <div class="price">100 Stars - $1</div>
        <button onclick="alert('Buy 100 Stars')">
            Buy Now
        </button>
    </div>

    <div class="item">
        <h2> Premium Gift Plan</h2>
        <div class="price">$5</div>
        <button onclick="alert('Buy Premium Gift')">
            Buy Now
        </button>
    </div>

    <div class="item">
        <h2> NFT</h2>
        <div class="price">$10</div>
        <button onclick="alert('Buy NFT')">
            Buy Now
        </button>
    </div>

    <button onclick="goBack()">
        ← Back
    </button>

</div>

<script>
function openShop(){
    document.getElementById("homePage").style.display="none";
    document.getElementById("shopPage").style.display="block";
}

function goBack(){
    document.getElementById("shopPage").style.display="none";
    document.getElementById("homePage").style.display="block";
}
</script>

</body>
</html>
