<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AiKipa Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.container{
width:350px;
background:#111;
border-radius:25px;
padding:35px;
box-shadow:0 0 25px rgba(0,255,255,.3);
animation:fadeIn 1s;
}

.logo{
width:180px;
height:180px;
margin:auto;
margin-bottom:25px;
border-radius:50%;
background:#000;
border:3px solid cyan;
color:cyan;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
box-shadow:0 0 30px cyan;
}

h1{
color:cyan;
font-size:30px;
margin-bottom:15px;
}

p{
color:#ddd;
margin-bottom:25px;
}

.item{
background:#1a1a1a;
padding:20px;
border-radius:15px;
margin-top:15px;
box-shadow:0 0 10px rgba(0,255,255,.2);
}

.price{
color:#00ffff;
font-size:22px;
margin:10px 0;
}

button{
background:cyan;
color:black;
border:none;
padding:14px 30px;
border-radius:50px;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px cyan;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<!-- Home Page -->
<div class="container" id="homePage">

<div class="logo">
AiKipa
</div>

<h1>Premium Gift Plan<br>NFT Stars Shop</h1>

<p>
လိုအပ်သော Premium Gift, NFT နှင့် Telegram Stars များကို ဝယ်ယူနိုင်ပါတယ်
</p>

<button onclick="openShop()">
Start
</button>

</div>

<!-- Shop Page -->
<div class="container" id="shopPage" style="display:none">

<h1>🛒 Shop Page</h1>

<div class="item">
<h2>⭐ Telegram Stars</h2>
<div class="price">100 Stars - $1</div>
<button>Buy Now</button>
</div>

<div class="item">
<h2>🎁 Premium Gift</h2>
<div class="price">$5</div>
<button>Buy Now</button>
</div>

<div class="item">
<h2>💎 NFT</h2>
<div class="price">$10</div>
<button>Buy Now</button>
</div>

<button onclick="goBack()">
← Back
</button>

</div>

<script>

function openShop(){
document.getElementById("homePage").style.display="none";
document.getElementById("shopPage").style.display="block";
}

function goBack(){
document.getElementById("shopPage").style.display="none";
document.getElementById("homePage").style.display="block";
}

</script>

</body>
</html>
