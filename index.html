<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AiKipa Program Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#00cfd1,#005c97);
    color:white;
}

.container{
    background:rgba(255,255,255,0.1);
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
    animation:fadeIn 1s ease;
    max-width:350px;
}

.logo{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    box-shadow:0 0 30px #00ffff;
    margin-bottom:20px;
}

h1{
    font-size:36px;
    margin:0;
    line-height:1.4;
}

p{
    font-size:18px;
    margin:20px 0;
    color:#f1f1f1;
}

button{
    background:white;
    color:#00cfd1;
    border:none;
    padding:15px 40px;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(255,255,255,0.5);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <img src="a_high_detail_neon_sci_fi_logo_graphic_scene_a_f.png"
         alt="AiKipa Program"
         class="logo">

    <h1>
        Premium Gift Plan<br>
        NFT Stars Shop
    </h1>

    <p>
        လိုအပ်သော Premium , NFT နှင့် Stars များကို
        ဝယ်ယူနိုင်ပါတယ်။
    </p>

    <button onclick="alert('Welcome to AiKipa!')">
        Start
    </button>

</div>

</body>
</html>
